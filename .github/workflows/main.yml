name: Build APK Rafael 2026

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Resolve o alerta de depreciação do Node 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configurar Bubblewrap de forma Silenciosa
        # Usamos as variáveis nativas do Runner do GitHub para não errar o caminho
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json
          echo "Configuração apontando para: ${ANDROID_HOME}"

      - name: Gerar APK
        # Respondemos 'y' apenas uma vez para a licença, evitando o loop infinito
        run: |
          echo "y" | bubblewrap build --manifest ./twa-manifest.json --skipSigning
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-2026
          path: ./**/*.apk
          if-no-files-found: error
