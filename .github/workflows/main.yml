name: Build Manual com Bubblewrap CLI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Força o uso do Node 24 para evitar os avisos de depreciação de 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 17
        # Instalamos o Java antes para o Bubblewrap não precisar baixar
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Gerar APK (Modo Não-Interativo)
        # O comando 'yes' responde "y" para todas as perguntas do terminal
        run: |
          yes | bubblewrap build --manifest ./twa-manifest.json --skipSigning
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-debug
          # Busca recursiva para garantir que encontre o APK gerado
          path: ./**/*.apk
          if-no-files-found: error
