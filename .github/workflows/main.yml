name: Build APK Rafael 2026 - The Sensor Fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;34.0.0 platforms;android-34 cmdline-tools;latest'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          bubblewrap updateConfig --jdkPath "${JAVA_HOME}" --androidSdkPath "${ANDROID_HOME}"

      - name: Install 'Expect' (Our Terminal Robot)
        run: sudo apt-get install -y expect

      - name: Closed-Loop Init (The Clean Spawn)
        run: |
          rm -rf build_rafael
          mkdir build_rafael
          cd build_rafael
          
          yes | sdkmanager --licenses || true
          
          # We spawn bash so the robot has full access to the system paths without npx noise.
          # It will silently watch for "?" and press Enter.
          cat << 'EOF' > automate.exp
          set timeout -1
          spawn bash -c "bubblewrap init --manifest='https://rafael-to-do.glide.page/manifest.json'"
          expect {
              -re "\\?.*" {
                  send "\r"
                  exp_continue
              }
              eof
          }
          EOF
          
          expect automate.exp

      - name: Raw Build
        run: |
          cd build_rafael
          export CI=false
          bubblewrap build --skipSigning

      - name: Manual Signing (Industrial Standard)
        run: |
          cd build_rafael
          
          keytool -genkeypair -v -storetype JKS -keystore ./rafael.jks -alias rafael_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass rafael2026 -keypass rafael2026 -dname "CN=Rafael, OU=Estudos, O=Miranda, L=Belo Horizonte, S=MG, C=BR"
          
          APK_IN=$(find . -name "*.apk" | head -n 1)
          echo "Raw APK found: $APK_IN"
          
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -v -p 4 "$APK_IN" app-rafael-aligned.apk
          
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign --ks ./rafael.jks --ks-key-alias rafael_alias --ks-pass pass:rafael2026 --key-pass pass:rafael2026 --out app-rafael-final.apk app-rafael-aligned.apk

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: build_rafael/app-rafael-final.apk
          if-no-files-found: error
