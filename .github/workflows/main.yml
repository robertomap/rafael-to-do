name: Build APK Rafael 2026 - O Gambito da Rainha

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        # Mantemos o Java para a nossa ferramenta de gerar a chave funcionar
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Deixar o Bubblewrap instalar o próprio SDK
        run: |
          export CI=false
          set +o pipefail
          # Aqui a gente manda "y" infinitamente SÓ para o diagnóstico. 
          # Ele vai baixar o Android SDK exato que ele precisa e não vai dar loop de senha.
          yes "y" | bubblewrap doctor

      - name: Gerar Chave de Segurança (Keystore)
        run: |
          keytool -genkeypair -v -keystore ./android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass rafael2026 -keypass rafael2026 -dname "CN=Rafael, OU=Estudos, O=Miranda, L=Belo Horizonte, S=MG, C=BR"

      - name: Injetar Manifesto
        run: |
          cat <<EOF > twa-manifest.json
          {
            "packageId": "com.miranda.roberto.todo.rafael",
            "host": "rafael-to-do.glide.page",
            "name": "Rafael To-Do Estudos",
            "launcherName": "Rafael ToDo",
            "display": "standalone",
            "themeColor": "#2E8B57",
            "navigationColor": "#000000",
            "backgroundColor": "#2E8B57",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://raw.githubusercontent.com/${{ github.repository }}/main/ToDO_icone.png",
            "splashScreenFadeOutDuration": 300,
            "shortcuts": [],
            "webManifestUrl": "https://rafael-to-do.glide.page/manifest.json",
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            }
          }
          EOF
          
      - name: Build Final (Limpo e Seguro)
        # Injetamos as senhas na variável de ambiente do Linux
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: rafael2026
          BUBBLEWRAP_KEY_PASSWORD: rafael2026
        run: |
          # Rodamos o build de forma limpa. O SDK já está lá, e as senhas estão na memória. Zero Prompts!
          export CI=false
          bubblewrap build --manifest ./twa-manifest.json --yes --skipSigning
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: ./**/*.apk
          if-no-files-found: error
