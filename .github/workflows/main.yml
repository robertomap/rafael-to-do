name: Build APK Rafael 2026 - A Retomada

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK (Com Lista de Compras)
        uses: android-actions/setup-android@v3
        with:
          # O Pulo do Gato: Obriga a baixar o que o Bubblewrap gosta!
          packages: 'build-tools;34.0.0 platforms;android-34 cmdline-tools;latest'

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configurar Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

      - name: Gerar Chave de Segurança
        run: |
          keytool -genkeypair -v -keystore ./android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass rafael2026 -keypass rafael2026 -dname "CN=Rafael, OU=Estudos, O=Miranda, L=Belo Horizonte, S=MG, C=BR"

      - name: Injetar Manifesto
        run: |
          cat <<EOF > twa-manifest.json
          {
            "packageId": "com.miranda.roberto.todo.rafael",
            "host": "rafael-to-do.glide.page",
            "name": "Rafael To-Do Estudos",
            "launcherName": "Rafael ToDo",
            "display": "standalone",
            "themeColor": "#2E8B57",
            "navigationColor": "#000000",
            "backgroundColor": "#2E8B57",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://raw.githubusercontent.com/${{ github.repository }}/main/ToDO_icone.png",
            "splashScreenFadeOutDuration": 300,
            "shortcuts": [],
            "webManifestUrl": "https://rafael-to-do.glide.page/manifest.json",
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            }
          }
          EOF
          
      - name: Build Final (Blindado)
        run: |
          export CI=false
          # Aceita as licenças do SDK por precaução
          yes | sdkmanager --licenses || true
          
          # Compila passando TODAS as informações para o robô não abrir a boca
          bubblewrap build --manifest ./twa-manifest.json --yes --keystoreAlias "android
