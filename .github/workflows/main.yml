name: Build APK Rafael 2026 - The Perfect PLC

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;34.0.0 platforms;android-34 cmdline-tools;latest'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          bubblewrap updateConfig --jdkPath "${JAVA_HOME}" --androidSdkPath "${ANDROID_HOME}"

      - name: Install 'Expect' (The PLC Robot)
        run: sudo apt-get install -y expect

      - name: The Assembly Line
        run: |
          rm -rf build_rafael
          mkdir build_rafael
          cd build_rafael
          
          export CI=false
          yes | sdkmanager --licenses || true
          
          echo ">>> 1. Creating the Keystore Manually..."
          # We use the default Bubblewrap names (android.keystore and android alias)
          keytool -genkeypair -v -storetype JKS -keystore ./android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass rafael2026 -keypass rafael2026 -dname "CN=Rafael, OU=Estudos, O=Miranda, L=Belo Horizonte, S=MG, C=BR"
          
          echo ">>> 2. Programming the PLC (State Machine)..."
          # This is the magic block!
          cat << 'EOF' > automate.exp
          set timeout -1
          spawn bash -c "bubblewrap init --manifest='https://rafael-to-do.glide.page/manifest.json'"
          expect {
              -nocase -re "password" {
                  send "rafael2026\r"
                  exp_continue
              }
              -re "\\?" {
                  send "\r"
                  exp_continue
              }
              eof
          }
          EOF
          
          echo ">>> 3. Running the PLC to Generate Scaffolding..."
          expect automate.exp
          
          echo ">>> 4. Compiling the Raw APK..."
          bubblewrap build --skipSigning
          
          echo ">>> 5. Aligning and Signing (Industrial Standard)..."
          APK_IN=$(find . -name "*.apk" | head -n 1)
          echo "Raw APK found: $APK_IN"
          
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -v -p 4 "$APK_IN" app-rafael-aligned.apk
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign --ks ./android.keystore --ks-key-alias android --ks-pass pass:rafael2026 --key-pass pass:rafael2026 --out app-rafael-final.apk app-rafael-aligned.apk

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: build_rafael/app-rafael-final.apk
          if-no-files-found: error
