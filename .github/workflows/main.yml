name: Build APK Rafael 2026 - Final na Raca

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Calar avisos de 2026 e forçar Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configurar e Compilar
        run: |
          # 1. Configuração de ambiente (Fim do erro de SDK)
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json
          
          # 2. Inicialização "Suave"
          # Tentamos ler o manifesto do Glide apenas para criar as pastas. 
          # Se der erro de ícone aqui, o '|| true' faz o script continuar.
          bubblewrap init --manifest https://rafael-to-do.glide.page/manifest.json --yes || true
          
          # 3. INJEÇÃO DA FONTE DA VERDADE
          # Aqui a gente ignora o Glide e escreve o que o Rafael precisa direto no arquivo de build
          cat <<EOF > twa-manifest.json
          {
            "packageId": "com.miranda.roberto.todo.rafael",
            "host": "rafael-to-do.glide.page",
            "name": "Rafael To-Do Estudos",
            "launcherName": "Rafael ToDo",
            "display": "standalone",
            "themeColor": "#2E8B57",
            "navigationColor": "#000000",
            "backgroundColor": "#2E8B57",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://raw.githubusercontent.com/${{ github.repository }}/main/ToDO_icone.png",
            "splashScreenFadeOutDuration": 300,
            "shortcuts": [],
            "webManifestUrl": "https://rafael-to-do.glide.page/manifest.json"
          }
          EOF
          
          echo "Manifesto técnico injetado com sucesso."
          
          # 4. Build Final
          # O '--yes' aceita as licenças e o '--skipSigning' gera o APK para teste imediato
          bubblewrap build --manifest ./twa-manifest.json --yes --skipSigning
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: ./**/*.apk
          if-no-files-found: error
