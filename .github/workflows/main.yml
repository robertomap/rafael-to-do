name: Build APK Rafael 2026 - Versão Definitiva

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Injetar Configuração
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json

      - name: Gerar APK
        run: |
          # Garante que o caminho do manifesto seja absoluto
          MANIFEST_PATH="${{ github.workspace }}/twa-manifest.json"
          
          echo "Verificando arquivo em: $MANIFEST_PATH"
          if [ -f "$MANIFEST_PATH" ]; then
            # 'init' cria o projeto e 'build' gera o APK
            bubblewrap build --manifest "$MANIFEST_PATH" --yes --skipSigning
          else
            echo "ERRO: Arquivo twa-manifest.json não encontrado na raiz!"
            exit 1
          fi
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: ./**/*.apk
          if-no-files-found: error
