name: Build APK Rafael 2026 - Estratégia de Arquivo Local

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configurar e Gerar APK
        run: |
          # 1. Configurar caminhos do SDK
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json
          
          # 2. Criar o Web Manifest LOCAL (A fonte da verdade)
          cat <<EOF > manifest.json
          {
            "name": "Rafael To-Do Estudos",
            "short_name": "Rafael ToDo",
            "start_url": "/",
            "display": "standalone",
            "background_color": "#2E8B57",
            "theme_color": "#2E8B57",
            "icons": [{ 
              "src": "https://raw.githubusercontent.com/${{ github.repository }}/main/ToDO_icone.png", 
              "sizes": "512x512", 
              "type": "image/png",
              "purpose": "any maskable"
            }]
          }
          EOF

          # 3. INICIALIZAR O PROJETO A PARTIR DO ARQUIVO (Ignora a rede/URL)
          # O comando 'init' gera o twa-manifest.json automaticamente com base no arquivo local
          bubblewrap init --manifest ./manifest.json --host rafael-to-do.glide.page --metaData.appVersionName "1.0.0" --yes
          
          # 4. BUILD FINAL
          bubblewrap build --yes --skipSigning
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: ./**/*.apk
          if-no-files-found: error
