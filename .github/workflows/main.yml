name: Gerar APK com Override de Manifesto

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Gerar Android APK
        uses: pwa-builder/pwa-action@v1
        with:
          # Mantemos a URL para validação de segurança
          url: https://rafael-to-do.glide.page
          platform: android
          # AQUI ESTÁ A MÁGICA: apontamos para o seu arquivo local
          # (Verifique se o nome do arquivo no repo é exatamente este)
          manifestFile: ./twa-manifest.json
          
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: ./**/*.apk
          if-no-files-found: error
