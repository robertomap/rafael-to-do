name: Build APK Rafael 2026 - Final Fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Resolve o alerta de depreciação do Node 20 para 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Aceitar Licenças do Android
        # Este passo é o "segredo". Ele aceita as licenças no local correto do Runner.
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --licenses

      - name: Configurar Caminhos Silenciosamente
        # Injetamos o config.json usando as variáveis oficiais do GitHub
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

      - name: Gerar APK
        # O segredo aqui é a flag --yes (que substitui o comando 'yes |')
        run: |
          bubblewrap build --manifest ./twa-manifest.json --skipSigning --yes
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: ./**/*.apk
          if-no-files-found: error
