name: Build APK Rafael 2026 - A Elegância Pura

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configurar Ambiente
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

      - name: Criar Web Manifest Local (A Isca)
        # O PULO DO GATO: Colocamos a URL completa no start_url. 
        # Assim o robô não precisa perguntar qual é o domínio!
        run: |
          cat <<EOF > manifest.json
          {
            "name": "Rafael To-Do Estudos",
            "short_name": "Rafael ToDo",
            "start_url": "https://rafael-to-do.glide.page/",
            "display": "standalone",
            "background_color": "#2E8B57",
            "theme_color": "#2E8B57",
            "icons": [{
              "src": "https://raw.githubusercontent.com/${{ github.repository }}/main/ToDO_icone.png",
              "sizes": "512x512",
              "type": "image/png"
            }]
          }
          EOF

      - name: Inicializar Projeto (Sem Perguntas)
        run: |
          export CI=false
          # O init lê o nosso json acima e monta a estrutura do Android sozinho.
          # A flag --yes aceita todos os valores padrão (já que demos todas as informações).
          bubblewrap init --manifest ./manifest.json --yes

      - name: Compilar APK (Build Final)
        run: |
          export CI=false
          # Como o init já preparou o terreno perfeito, o build só empacota.
          bubblewrap build --yes --skipSigning
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: ./**/*.apk
          if-no-files-found: error
