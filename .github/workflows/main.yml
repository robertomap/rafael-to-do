name: Build APK Rafael 2026 - The Black Box (Patched)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;34.0.0 platforms;android-34 cmdline-tools;latest'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          bubblewrap updateConfig --jdkPath "${JAVA_HOME}" --androidSdkPath "${ANDROID_HOME}"

      - name: The Black Box Assembly Line (Manifest + Build)
        run: |
          rm -rf build_rafael
          mkdir build_rafael
          cd build_rafael
          
          echo ">>> 1. Writing the Perfect Manifest..."
          cat <<EOF > twa-manifest.json
          {
            "packageId": "com.miranda.roberto.todo.rafael",
            "host": "rafael-to-do.glide.page",
            "name": "Rafael To-Do",
            "launcherName": "Rafael ToDo",
            "display": "standalone",
            "themeColor": "#2E8B57",
            "navigationColor": "#000000",
            "backgroundColor": "#2E8B57",
            "startUrl": "/",
            "iconUrl": "https://raw.githubusercontent.com/${{ github.repository }}/main/ToDO_icone.png",
            "maskableIconUrl": "https://raw.githubusercontent.com/${{ github.repository }}/main/ToDO_icone.png",
            "splashScreenFadeOutDuration": 300,
            "fallbackUrl": "https://rafael-to-do.glide.page/",
            "webManifestUrl": "https://rafael-to-do.glide.page/manifest.json",
            "enableNotifications": false,
            "features": { "playBilling": { "enabled": false } },
            "alphaDependencies": { "enabled": false }
          }
          EOF
          
          echo ">>> 2. Quality Control (Checking if file exists):"
          ls -la
          
          echo ">>> 3. Generating Android Scaffolding..."
          export CI=true
          bubblewrap generate --manifest ./twa-manifest.json
          
          echo ">>> 4. Building the Raw APK..."
          bubblewrap build --skipSigning

      - name: Manual Signing (Industrial Standard)
        run: |
          cd build_rafael
          
          echo ">>> Generating Keystore..."
          keytool -genkeypair -v -storetype JKS -keystore ./rafael.jks -alias rafael_
