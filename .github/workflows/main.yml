name: Build APK Final Rafael

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Garante compatibilidade com o runner do GitHub em 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Gerar Android APK
        uses: pwa-builder/pwa-action@v1
        with:
          url: https://rafael-to-do.glide.page
          platform: android
          # Forçamos o uso do seu manifesto local para garantir o Standalone
          manifestFile: ./twa-manifest.json
          
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          # O "pulo do gato": busca qualquer arquivo .apk em qualquer pasta
          path: "**/*.apk"
          if-no-files-found: error
