name: Build APK Rafael 2026 - The Live Manifest

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;34.0.0 platforms;android-34 cmdline-tools;latest'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          bubblewrap updateConfig --jdkPath "${JAVA_HOME}" --androidSdkPath "${ANDROID_HOME}"

      - name: Init via Live Glide Manifest
        run: |
          rm -rf build_rafael
          mkdir build_rafael
          cd build_rafael
          
          yes | sdkmanager --licenses || true
          
          # THE MAGIC: We tell Bubblewrap to download the real manifest directly from the app!
          # The --yes flag will happily accept all the correct data it downloads.
          export CI=false
          bubblewrap init --manifest="https://rafael-to-do.glide.page/manifest.json" --yes

      - name: Raw Build
        run: |
          cd build_rafael
          export CI=false
          # We still skip Bubblewrap's signing so it doesn't trigger the Keystore prompts
          bubblewrap build --skipSigning

      - name: Manual Signing (Industrial Standard)
        run: |
          cd build_rafael
          
          # 1. Create the secure key
          keytool -genkeypair -v -storetype JKS -keystore ./rafael.jks -alias rafael_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass rafael2026 -keypass rafael2026 -dname "CN=Rafael, OU=Estudos, O=Miranda, L=Belo Horizonte, S=MG, C=BR"
          
          # 2. Find the raw APK generated by Bubblewrap
          APK_IN=$(find . -name "*.apk" | head -n 1)
          echo "Raw APK found: $APK_IN"
          
          # 3. Zipalign (Memory optimization)
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -v -p 4 "$APK_IN" app-rafael-aligned.apk
          
          # 4. Apksigner (Official signing bypassing all prompts)
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign --ks ./rafael.jks --ks-key-alias rafael_alias --ks-pass pass:rafael2026 --key-pass pass:rafael2026 --out app-rafael-final.apk app-rafael-aligned.apk

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: build_rafael/app-rafael-final.apk
          if-no-files-found: error
