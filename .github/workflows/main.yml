name: Build APK Rafael 2026 - A Vitória Definitiva

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;34.0.0 platforms;android-34 cmdline-tools;latest'

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configurar Bubblewrap
        run: |
          bubblewrap updateConfig --jdkPath "${JAVA_HOME}" --androidSdkPath "${ANDROID_HOME}"

      - name: Preparar Sala Limpa e Chave JKS (Antifalaha)
        run: |
          # 1. Destrói qualquer pasta velha e cria uma nova com nome exclusivo
          rm -rf build_rafael
          mkdir build_rafael
          cd build_rafael
          
          # 2. Gera a chave explicitamente no formato JKS (Storetype JKS) e alias único
          keytool -genkeypair -v -storetype JKS -keystore ./rafael.jks -alias rafael_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass rafael2026 -keypass rafael2026 -dname "CN=Rafael, OU=Estudos, O=Miranda, L=Belo Horizonte, S=MG, C=BR"
          
          # 3. Atualiza o manifesto apontando para os novos arquivos
          cat <<EOF > twa-manifest.json
          {
            "packageId": "com.miranda.roberto.todo.rafael",
            "host": "rafael-to-do.glide.page",
            "name": "Rafael To-Do Estudos",
            "launcherName": "Rafael ToDo",
            "display": "standalone",
            "themeColor": "#2E8B57",
            "navigationColor": "#000000",
            "backgroundColor": "#2E8B57",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://raw.githubusercontent.com/${{ github.repository }}/main/ToDO_icone.png",
            "splashScreenFadeOutDuration": 300,
            "shortcuts": [],
            "webManifestUrl": "https://rafael-to-do.glide.page/manifest.json",
            "signingKey": {
              "path": "./rafael.jks",
              "alias": "rafael_alias"
            }
          }
          EOF
          
      - name: Build Final
        run: |
          cd build_rafael
          export CI=false
          yes | sdkmanager --licenses || true
          
          # Passamos os novos nomes para o robô
          bubblewrap build --manifest ./twa-manifest.json --yes --keystoreAlias "rafael_alias" --keystorePassword "rafael2026" --keyPassword "rafael2026"
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: build_rafael/**/*.apk
          if-no-files-found: error
