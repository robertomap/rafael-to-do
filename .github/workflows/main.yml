name: Build Manual com Bubblewrap CLI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Adicionamos esta variável global para calar o aviso de depreciação
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Atualizado para a versão recomendada

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Gerar APK
        # O comando build local ignora o cache do Glide
        run: |
          bubblewrap build --manifest ./twa-manifest.json --skipSigning
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-debug
          path: ./**/*.apk
          if-no-files-found: error
