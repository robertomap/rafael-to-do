name: Build APK Rafael 2026 - The Perfect Manifest

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;34.0.0 platforms;android-34 cmdline-tools;latest'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          npx @bubblewrap/cli updateConfig --jdkPath "${JAVA_HOME}" --androidSdkPath "${ANDROID_HOME}"

      - name: The Perfect Manifest (Zero Blanks)
        run: |
          rm -rf build_rafael
          mkdir build_rafael
          cd build_rafael
          
          # By providing EVERY parameter, Bubblewrap has nothing to ask!
          cat <<EOF > twa-manifest.json
          {
            "packageId": "com.miranda.roberto.todo.rafael",
            "host": "rafael-to-do.glide.page",
            "name": "Rafael To-Do",
            "launcherName": "Rafael ToDo",
            "display": "standalone",
            "orientation": "any",
            "themeColor": "#2E8B57",
            "navigationColor": "#000000",
            "backgroundColor": "#2E8B57",
            "splashScreenColor": "#2E8B57",
            "startUrl": "/",
            "iconUrl": "https://raw.githubusercontent.com/${{ github.repository }}/main/ToDO_icone.png",
            "maskableIconUrl": "https://raw.githubusercontent.com/${{ github.repository }}/main/ToDO_icone.png",
            "splashScreenFadeOutDuration": 300,
            "fallbackUrl": "https://rafael-to-do.glide.page/",
            "enableNotifications": false,
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "features": {
              "playBilling": {
                "enabled": false
              }
            },
            "alphaDependencies": {
              "enabled": false
            }
          }
          EOF

      - name: Raw Build
        run: |
          cd build_rafael
          export CI=true 
          yes | sdkmanager --licenses || true
          
          # Since the manifest is complete, we skip init and go straight to build.
          npx @bubblewrap/cli build --skipSigning

      - name: Manual Signing (Industrial Standard)
        run: |
          cd build_rafael
          
          keytool -genkeypair -v -storetype JKS -keystore ./rafael.jks -alias rafael_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass rafael2026 -keypass rafael2026 -dname "CN=Rafael, OU=Estudos, O=Miranda, L=Belo Horizonte, S=MG, C=BR"
          
          APK_IN=$(find . -name "*.apk" | head -n 1)
          echo "Raw APK found: $APK_IN"
          
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -v -p 4 "$APK_IN" app-rafael-aligned.apk
          
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign --ks ./rafael.jks --ks-key-alias rafael_alias --ks-pass pass:rafael2026 --key-pass pass:rafael2026 --out app-rafael-final.apk app-rafael-aligned.apk

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: build_rafael/app-rafael-final.apk
          if-no-files-found: error
