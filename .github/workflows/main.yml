name: Build APK Rafael 2026 - Final Stable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Calar avisos de depreciação e forçar o motor de 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Injetar Configuração do Ambiente
        # Aqui eliminamos o erro de "SDK incorrect" injetando os caminhos oficiais
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json
          echo "Bubblewrap configurado para usar SDK em: ${ANDROID_HOME}"

      - name: Gerar APK
        # O segredo: --yes aceita licenças e --skipSigning evita a necessidade de chaves agora
        run: |
          bubblewrap build --manifest ./twa-manifest.json --yes --skipSigning
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          # O asterisco duplo garante que ele encontre o arquivo não importa onde o Gradle o coloque
          path: ./**/*.apk
          if-no-files-found: error
