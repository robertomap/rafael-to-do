name: Build APK Manual 2026

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Garante que as ações rodem no Node 24 exigido em 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configurar Caminhos do Android (Fix 2026)
        # Este passo cria o arquivo de configuração que o Bubblewrap exige
        # Usamos as variáveis oficiais do sistema (ANDROID_HOME e JAVA_HOME)
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          echo "Configuração do Bubblewrap injetada com sucesso."

      - name: Aceitar Licenças e Gerar APK
        # O 'echo y' responde apenas o necessário, evitando o erro de "Broken pipe" do 'yes'
        # O '--yes' final é uma flag nativa para automação
        run: |
          echo "y" | bubblewrap build --manifest ./twa-manifest.json --skipSigning --yes
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: ./**/*.apk
          if-no-files-found: error
