name: Build APK Rafael - Debug e Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Injetar Configuração
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json

      - name: Verificar Arquivos e Gerar APK
        run: |
          echo "--- Listando arquivos no diretório atual ---"
          ls -R
          echo "--- Iniciando o Build ---"
          # Usamos o find para garantir que o Bubblewrap localize o arquivo exato
          MANIFEST_PATH=$(find . -name "twa-manifest.json" | head -n 1)
          bubblewrap build --manifest "$MANIFEST_PATH" --yes --skipSigning
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: ./**/*.apk
          if-no-files-found: error
