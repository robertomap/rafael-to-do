name: Build APK Rafael 2026 - Bypass de CDN

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configurar e Gerar APK
        run: |
          # 1. Configuração do ambiente
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json
          
          # 2. Criar o Web Manifest local (para o Bubblewrap não ter que baixar do Glide)
          cat <<EOF > manifest.json
          {
            "name": "Rafael To-Do Estudos",
            "short_name": "Rafael ToDo",
            "start_url": "/",
            "display": "standalone",
            "background_color": "#2E8B57",
            "theme_color": "#2E8B57",
            "icons": [
              {
                "src": "https://raw.githubusercontent.com/robertomap/rafael-to-do/main/ToDO_icone.png",
                "sizes": "512x512",
                "type": "image/png"
              }
            ]
          }
          EOF

          # 3. Criar o TWA Manifest apontando para o arquivo que acabamos de criar acima
          cat <<EOF > twa-manifest.json
          {
            "packageId": "com.miranda.roberto.todo.rafael",
            "host": "rafael-to-do.glide.page",
            "name": "Rafael To-Do Estudos",
            "launcherName": "Rafael ToDo",
            "display": "standalone",
            "themeColor": "#2E8B57",
            "navigationColor": "#000000",
            "backgroundColor": "#2E8B57",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://raw.githubusercontent.com/robertomap/rafael-to-do/main/ToDO_icone.png",
            "splashScreenFadeOutDuration": 300,
            "shortcuts": [],
            "webManifestUrl": "https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json"
          }
          EOF
          
          echo "--- Ambiente Local Preparado ---"
          
          # 4. Build Final
          bubblewrap build --manifest ./twa-manifest.json --yes --skipSigning
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
          path: ./**/*.apk
