name: Build APK Rafael 2026 - O Arquivo de Respostas

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceitar Licenças do Android
        # Garantia extra para o SDK não abrir nenhum prompt surpresa pedindo 'y'
        run: yes | sdkmanager --licenses || true

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configurar Ambiente
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

      - name: Injetar Manifesto
        run: |
          cat <<EOF > twa-manifest.json
          {
            "packageId": "com.miranda.roberto.todo.rafael",
            "host": "rafael-to-do.glide.page",
            "name": "Rafael To-Do Estudos",
            "launcherName": "Rafael ToDo",
            "display": "standalone",
            "themeColor": "#2E8B57",
            "navigationColor": "#000000",
            "backgroundColor": "#2E8B57",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://raw.githubusercontent.com/${{ github.repository }}/main/ToDO_icone.png",
            "splashScreenFadeOutDuration": 300,
            "shortcuts": [],
            "webManifestUrl": "https://rafael-to-do.glide.page/manifest.json"
          }
          EOF
          
      - name: Build Final (A Prova de Falhas)
        run: |
          export CI=false
          
          # 1. Criamos um arquivo chamado 'respostas.txt' com 15 quebras de linha (Enters)
          printf '\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n' > respostas.txt
          
          # 2. O PULO DO GATO: Usamos '<' (Input Redirect) em vez de '|' (Pipe).
          # O Bubblewrap lê o arquivo, usa os Enters que precisar e não dá crash quando termina!
          bubblewrap build --manifest ./twa-manifest.json --skipSigning < respostas.txt
        
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-final
