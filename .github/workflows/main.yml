name: Build APK Rafael 2026 - Versão de Engenharia

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Retornamos ao ubuntu-latest mas com configuração explícita de SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        # Esta Action garante que o SDK está pronto e as ferramentas básicas instaladas
        uses: android-actions/setup-android@v3

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configuração Forçada do Ambiente
        # Aqui injetamos o config.json usando as variáveis de ambiente que o setup-android configurou
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          echo "Configuração: JDK em $JAVA_HOME | SDK em $ANDROID_HOME"

      - name: Gerar Manifesto e Compilar APK
        # Injetamos o manifesto com o modo standalone para o Rafael e rodamos o build
        run: |
          cat <<EOF > twa-manifest.json
          {
            "packageId": "com.miranda.roberto.todo.rafael",
            "host": "rafael-to-do.glide.page",
            "name": "Rafael To-Do Estudos",
            "launcherName": "Rafael ToDo",
            "display": "standalone",
            "themeColor": "#2E8B57",
            "navigationColor": "#000000",
            "backgroundColor": "#2E8B57",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://raw.githubusercontent.com/${{ github.repository }}/main/ToDO_icone.png",
            "splashScreenFadeOutDuration": 300,
            "shortcuts": [],
            "webManifestUrl": "https://rafael-to-do.glide.page/manifest.json"
          }
          EOF
          
          # Usamos --yes para automação total e --skipSigning para gerar o debug APK
          bubblewrap build --manifest ./twa-manifest.json --yes --skipSigning
        
      - name: Upload do APK Final
        uses: actions/upload-artifact@v4
        with:
          name: app-rafael-debug
          path: ./**/*.apk
          if-no-files-found: error
